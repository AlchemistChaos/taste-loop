<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TASTELOOP · Mission Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ttpink: "#FE2C55",
            ttcyan: "#25F4EE",
          },
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <style>
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(254,44,85,0.14), transparent 60%),
        radial-gradient(1200px 600px at 100% 0%, rgba(37,244,238,0.10), transparent 55%),
        #050507;
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    /* Active-agent pulse */
    @keyframes pulseRing {
      0%   { box-shadow: 0 0 0 0 rgba(37,244,238,0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(37,244,238,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,244,238,0); }
    }
    .agent-active { animation: pulseRing 1.4s infinite; border-color: #25F4EE !important; }
    /* Fly-in for newly spawned agents */
    @keyframes flyIn {
      0%   { opacity: 0; transform: translateY(14px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .agent-card { animation: flyIn 0.45s cubic-bezier(.2,.8,.2,1) both; }
    /* Counter bump when value changes */
    @keyframes bump {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .bump { animation: bump 0.4s ease; }
    /* Score winner glow */
    @keyframes winGlow {
      0%,100% { text-shadow: 0 0 18px rgba(37,244,238,0.7); }
      50%     { text-shadow: 0 0 34px rgba(37,244,238,1); }
    }
    .score-winning { animation: winGlow 1.6s ease-in-out infinite; }
    .tabular { font-variant-numeric: tabular-nums; }
    .dot {
      width: 8px; height: 8px; border-radius: 9999px; display: inline-block;
      background: #3f3f46;
    }
    .dot-on { background: #25F4EE; box-shadow: 0 0 10px #25F4EE; }
    iframe { background: #fff; }
    /* Skill chips */
    .skill-chip {
      font-size: 8.5px; line-height: 1; font-weight: 800; letter-spacing: 0.02em;
      padding: 2px 5px; border-radius: 9999px;
      background: rgba(37,244,238,0.10); color: #25F4EE;
      border: 1px solid rgba(37,244,238,0.22);
      white-space: nowrap;
    }
    .skill-chip.tool { background: rgba(254,44,85,0.10); color: #ff7793; border-color: rgba(254,44,85,0.25); }
    /* Master-authored prompt reveal (expand on click) */
    .agent-prompt {
      display: none;
      margin-top: 4px;
      font-size: 9px; line-height: 1.35; font-style: italic;
      color: rgba(255,255,255,0.55);
      border-top: 1px dashed rgba(255,255,255,0.12);
      padding-top: 4px;
      max-height: 7.5em; overflow-y: auto;
      white-space: pre-wrap;
    }
    .agent-card.prompt-open .agent-prompt { display: block; }
    .agent-card.has-prompt { cursor: pointer; }
    .prompt-toggle {
      font-size: 8px; font-weight: 900; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.30); user-select: none;
    }
    .agent-card.has-prompt:hover .prompt-toggle { color: #25F4EE; }
    /* Strategy banner */
    .strategy-banner {
      font-size: 10.5px; line-height: 1.35;
      color: rgba(255,255,255,0.62);
    }
    .strategy-banner .lbl {
      font-size: 8.5px; font-weight: 900; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(37,244,238,0.8);
    }
    /* Scrollbar */
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-thumb { background: #2a2a31; border-radius: 9px; }
  </style>
</head>
<body class="min-h-screen overflow-hidden">
  <!-- TOP STRIP -->
  <header class="flex items-center justify-between gap-4 px-6 py-3 border-b border-white/10 bg-black/40 backdrop-blur">
    <div class="flex items-center gap-3 min-w-0">
      <div class="text-2xl font-black tracking-tight">
        TASTE<span class="text-ttpink">LOOP</span>
      </div>
      <div class="hidden md:block text-sm text-white/50 font-semibold uppercase tracking-wider truncate">
        GOAL: TikTok for Business homepage
      </div>
    </div>

    <div class="flex items-center gap-3">
      <!-- Run clock / status -->
      <div class="hidden sm:flex items-center gap-2 text-xs font-semibold text-white/60">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">idle</span>
        <span class="text-white/30">·</span>
        <span id="clock" class="tabular text-white/80">0.0s</span>
      </div>

      <!-- Speed control -->
      <div class="flex items-center rounded-lg overflow-hidden border border-white/15">
        <button data-speed="1" class="speed-btn px-3 py-1.5 text-sm font-bold">1x</button>
        <button data-speed="4" class="speed-btn px-3 py-1.5 text-sm font-bold border-l border-white/15">4x</button>
        <button data-speed="8" class="speed-btn px-3 py-1.5 text-sm font-bold border-l border-white/15">8x</button>
      </div>

      <button id="restartBtn"
        class="px-4 py-1.5 rounded-lg bg-ttpink text-white text-sm font-extrabold hover:brightness-110 active:scale-95 transition">
        ⟲ Restart
      </button>
    </div>
  </header>

  <!-- ERROR BANNER -->
  <div id="errorBanner" class="hidden mx-6 mt-4 rounded-xl border border-ttpink/50 bg-ttpink/10 px-5 py-4 text-sm">
    <div class="font-extrabold text-ttpink text-base mb-1">Could not load run/events.json</div>
    <div id="errorDetail" class="text-white/70"></div>
    <div class="text-white/50 mt-2">
      Serve from the <span class="font-mono text-white/80">web/</span> directory, e.g.
      <span class="font-mono text-white/80">python3 -m http.server 8080</span>, then open
      <span class="font-mono text-white/80">http://localhost:8080</span>.
    </div>
  </div>

  <!-- TWO COLUMNS -->
  <main class="grid grid-cols-2 gap-4 px-4 py-4" style="height: calc(100vh - 57px);">
    <!-- columns injected here -->
    <section id="col-no-memory"></section>
    <section id="col-memory"></section>
  </main>

  <!-- Column template -->
  <template id="colTemplate">
    <div class="flex flex-col h-full rounded-2xl border bg-black/30 overflow-hidden">
      <!-- Column header -->
      <div class="flex items-center justify-between px-5 py-3 border-b border-white/10">
        <div class="flex items-center gap-2">
          <h2 class="text-lg md:text-xl font-black tracking-tight js-title"></h2>
          <span class="js-badge text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full"></span>
        </div>
        <!-- SCORE -->
        <div class="text-right leading-none">
          <div class="text-[10px] uppercase tracking-widest text-white/40 font-bold">Score</div>
          <div class="js-score tabular text-4xl md:text-5xl font-black">0</div>
        </div>
      </div>

      <!-- COUNTERS ROW -->
      <div class="grid grid-cols-5 gap-2 px-4 py-3 border-b border-white/10">
        <div class="text-center">
          <div class="js-agents counter tabular text-2xl md:text-3xl font-black">0</div>
          <div class="text-[9px] md:text-[10px] uppercase tracking-wider text-white/40 font-bold">Agents</div>
        </div>
        <div class="text-center">
          <div class="tabular text-2xl md:text-3xl font-black">
            <span class="js-turns counter">0</span><span class="text-white/30 text-lg">/20</span>
          </div>
          <div class="text-[9px] md:text-[10px] uppercase tracking-wider text-white/40 font-bold">Turns</div>
        </div>
        <div class="text-center">
          <div class="js-traces counter tabular text-2xl md:text-3xl font-black">0</div>
          <div class="text-[9px] md:text-[10px] uppercase tracking-wider text-white/40 font-bold">Traces</div>
        </div>
        <div class="text-center">
          <div class="js-improvements counter tabular text-2xl md:text-3xl font-black">0</div>
          <div class="text-[9px] md:text-[10px] uppercase tracking-wider text-white/40 font-bold">Improve</div>
        </div>
        <div class="text-center">
          <div class="js-lessons counter tabular text-2xl md:text-3xl font-black">0</div>
          <div class="text-[9px] md:text-[10px] uppercase tracking-wider text-white/40 font-bold">Lessons</div>
        </div>
      </div>

      <!-- MASTER STRATEGY BANNER (filled from master.planned.strategy) -->
      <div class="js-strategy strategy-banner hidden px-4 py-2 border-b border-white/10 bg-white/[0.02]">
        <span class="lbl">Strategy</span>
        <span class="js-strategy-text align-middle"></span>
      </div>

      <!-- AGENT GRID -->
      <div class="px-4 py-3 border-b border-white/10">
        <div class="flex items-center justify-between mb-2">
          <div class="text-[10px] uppercase tracking-widest text-white/40 font-bold">Studio · master-authored team</div>
          <div class="js-doing-global text-[11px] text-white/50 truncate max-w-[60%] text-right"></div>
        </div>
        <div class="js-grid grid grid-cols-5 gap-2"></div>
      </div>

      <!-- LIVE IFRAME -->
      <div class="flex-1 min-h-0 p-3">
        <div class="h-full rounded-xl overflow-hidden border border-white/10 bg-white relative">
          <div class="js-iframe-empty absolute inset-0 flex items-center justify-center text-center text-zinc-400 text-sm font-semibold p-6">
            Waiting for first render…
          </div>
          <iframe class="js-iframe w-full h-full block" title="live site preview"
            sandbox="allow-same-origin" loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </template>

  <!-- Agent card template -->
  <template id="agentTemplate">
    <div class="agent-card rounded-lg border border-white/15 bg-white/[0.03] px-2.5 py-2 flex flex-col gap-1 min-w-0"
         title="Click to view this agent's master-authored prompt">
      <div class="flex items-center gap-1.5">
        <span class="js-dot dot"></span>
        <span class="js-role text-[11px] font-extrabold tracking-tight truncate"></span>
        <span class="js-prompt-toggle prompt-toggle ml-auto hidden">PROMPT ▸</span>
        <span class="js-version text-[9px] font-bold text-white/40 tabular ml-1.5"></span>
      </div>
      <!-- Granted skills/tools from agent.spawned.skills -->
      <div class="js-skills flex flex-wrap gap-1 hidden"></div>
      <div class="js-doing text-[10px] text-white/50 leading-tight line-clamp-2 min-h-[1.6em]"></div>
      <!-- Master-authored prompt (agent.spawned.prompt) -->
      <div class="js-prompt agent-prompt"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
