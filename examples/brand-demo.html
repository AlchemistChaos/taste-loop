<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TasteLoop · TikTok For Business Design System — demo</title>
  <!-- Doc-approved free substitutes for Sofia Pro / Sofia Pro Soft -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- The real design system (web/run/design-system.css). Adjust path as served. -->
  <link rel="stylesheet" href="../web/run/design-system.css">
</head>
<body class="ds-body">

  <!-- HERO — flat color block, one brand color, pill CTA, Razzmatazz emphasis -->
  <section class="ds-section ds-bg">
    <div class="ds-container ds-stack">
      <span class="ds-bubble ds-bubble-outline ds-caption">TikTok For Business</span>
      <h1 class="ds-h1">Don't make ads.<br>Make a <span class="ds-emph">new trend.</span></h1>
      <p class="ds-lead ds-muted">Smart, direct proof points — with a hint of playfulness.</p>
      <div>
        <a class="ds-btn ds-btn-primary" href="#">Get started</a>
        <a class="ds-btn ds-btn-outline" href="#">See how it works</a>
      </div>
    </div>
  </section>

  <!-- PROOF — light surface, black text, Razzmatazz keyword -->
  <section class="ds-section ds-bg-light">
    <div class="ds-container ds-stack">
      <h2 class="ds-h2">Grow your brand. Make graphs go <span class="ds-emph">up.</span></h2>
      <div class="ds-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="ds-surface-light" style="padding:var(--space-6)">
          <p class="ds-subhead">2.5x</p><p class="ds-body-text">reach vs. baseline</p>
        </div>
        <div class="ds-surface-light" style="padding:var(--space-6)">
          <p class="ds-subhead">+40%</p><p class="ds-body-text">engagement</p>
        </div>
        <div class="ds-surface-light" style="padding:var(--space-6)">
          <p class="ds-subhead">1M+</p><p class="ds-body-text">creators</p>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA — Splash full-bleed block, BLACK text/CTA (Splash never highlights text) -->
  <section class="ds-section ds-bg-secondary">
    <div class="ds-container ds-stack">
      <h2 class="ds-h2">Ready to unleash your creative side?</h2>
      <div><a class="ds-btn ds-btn-primary" href="#">Start free</a></div>
    </div>
  </section>

</body>
</html>
